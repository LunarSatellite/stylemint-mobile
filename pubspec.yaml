name: stylemint_mobile_frontend
description: "Style Mint mobile app — Customer + Creator + Vendor."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.41.9'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Routing ──────────────────────────────────────────────────────────────
  go_router: ^17.2.3

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^3.1.0

  # ── Clean Architecture error handling ─────────────────────────────────────
  fpdart: ^1.1.0

  # ── HTTP (data layer only) ────────────────────────────────────────────────
  dio: ^5.7.0
  dio_smart_retry: ^7.0.1

  # ── Models / DTOs (data layer only) ───────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ── Forms ────────────────────────────────────────────────────────────────
  formz: ^0.8.0

  # ── Storage ──────────────────────────────────────────────────────────────
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.5

  # ── Push + realtime ──────────────────────────────────────────────────────
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  signalr_netcore: ^1.3.7

  # ── Media + camera ───────────────────────────────────────────────────────
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  file_picker: ^12.0.0-beta.4
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.1
  flutter_web_browser: ^0.17.1

  # ── Maps (Pillar B) ───────────────────────────────────────────────────────
  google_maps_flutter: ^2.9.0
  geolocator: ^14.0.1

  # ── i18n ─────────────────────────────────────────────────────────────────
  intl: any
  timezone: ^0.11.0

  # ── Auth helpers ──────────────────────────────────────────────────────────
  local_auth: ^3.0.1
  app_links: ^7.0.0

  # ── Network awareness ─────────────────────────────────────────────────────
  connectivity_plus: ^7.1.1

  # ── Crash + logging ───────────────────────────────────────────────────────
  sentry_flutter: ^8.10.0
  logger: ^2.4.0

  # ── UI helpers ────────────────────────────────────────────────────────────
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10

  # ── Misc ─────────────────────────────────────────────────────────────────
  uuid: ^4.5.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  very_good_analysis: ^10.2.0

  build_runner: ^2.5.0
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

  mocktail: ^1.0.4
  patrol: ^4.6.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/

